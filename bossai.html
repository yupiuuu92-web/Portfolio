<!DOCTYPE html>
<html lang="ky">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Жасалма интеллект | Мугалим</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap');

:root { --transition: all 0.4s cubic-bezier(0.4,0,0.2,1); }

body{
    font-family:'Montserrat',sans-serif;
    background:#ffffff;
    color:#000;
    transition:var(--transition);
}

.dark-mode{
    background:#0a0a0a !important;
    color:#fff !important;
}

/* BUTTON */
.glass-btn{
    background:rgba(0,0,0,0.05);
    backdrop-filter:blur(10px);
    border:1px solid rgba(0,0,0,0.1);
    transition:var(--transition);
}
.dark-mode .glass-btn{
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2);
}

/* ICON FIX */
#themeIcon{ color:#000; }
.dark-mode #themeIcon{ color:#fff; }

/* HERO */
.hero{
    position:relative;
    height:70vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    background:#0f172a;
    overflow:hidden;
}

.hero img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

.hero-overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.55);
}

.hero h1{
    position:relative;
    color:white;
    font-size:clamp(32px,6vw,64px);
    font-weight:700;
    line-height:1.1;
}

/* CARDS */
.card{
    background:#fff;
    border-radius:2.5rem;
    border:1px solid #eee;
    transition:var(--transition);
}
.dark-mode .card{
    background:#111;
    border-color:#222;
}
.card:hover{
    transform:translateY(-10px);
    box-shadow:0 30px 60px -12px rgba(0,0,0,0.1);
}

/* ANIMATION */
.reveal{
    opacity:0;
    transform:translateY(30px);
    transition:all 0.8s ease;
}
.reveal.active{
    opacity:1;
    transform:translateY(0);
}
</style>
</head>

<body>

<!-- TOP BUTTONS -->
<div class="fixed top-6 left-6 z-50">
    <a href="index.html" class="glass-btn w-12 h-12 rounded-xl flex items-center justify-center hover:scale-110">
        <i class="fas fa-arrow-left"></i>
    </a>
</div>

<div class="fixed top-6 right-6 z-50">
    <button id="themeBtn" class="glass-btn w-12 h-12 rounded-xl flex items-center justify-center hover:scale-110">
        <i id="themeIcon" class="fas fa-moon"></i>
    </button>
</div>

<!-- HERO -->
<section class="hero">
    <img src="https://images.unsplash.com/photo-1677442136019-21780ecad995"
         onerror="this.style.display='none'">

    <div class="hero-overlay"></div>

    <h1>
        Жасалма интеллектти <br> башкарган мугалим
    </h1>
</section>

<!-- CONTENT -->
<main class="py-20 px-6 max-w-6xl mx-auto">

<div class="grid md:grid-cols-2 gap-10">

    <!-- CARD 1 -->
    <div class="card p-8 reveal">
        <div class="flex justify-between mb-6">
            <i class="fas fa-robot text-3xl text-indigo-500 opacity-40"></i>
            <span class="text-xs opacity-40">AI</span>
        </div>

        <h2 class="text-2xl font-bold italic mb-4">
            ЖИ колдонуу
        </h2>

        <p class="text-sm opacity-60 leading-relaxed">
            Жасалма интеллект сабакты кызыктуу кылып, окуучунун ой жүгүртүүсүн өнүктүрөт.
        </p>
    </div>

    <!-- CARD 2 -->
    <div class="card p-8 reveal" style="transition-delay:.1s;">
        <div class="flex justify-between mb-6">
            <i class="fas fa-lightbulb text-3xl text-amber-500 opacity-40"></i>
            <span class="text-xs opacity-40">Метод</span>
        </div>

        <h2 class="text-2xl font-bold italic mb-4">
            Инновациялык ыкма
        </h2>

        <p class="text-sm opacity-60 leading-relaxed">
            ЖИ аркылуу тест, видео жана интерактивдүү сабактарды түзүүгө болот.
        </p>
    </div>

    <!-- VIDEO -->
    <div class="card p-4 reveal md:col-span-2" style="transition-delay:.2s;">
        <video class="w-full rounded-2xl" controls>
            <source src="video1.mp4" type="video/mp4">
        </video>
    </div>

    <div class="card p-4 reveal" style="transition-delay:.3s;">
        <video class="w-full rounded-2xl" controls>
            <source src="video2.mp4" type="video/mp4">
        </video>
    </div>

    <div class="card p-4 reveal" style="transition-delay:.4s;">
        <video class="w-full rounded-2xl" controls>
            <source src="video3.mp4" type="video/mp4">
        </video>
    </div>

</div>
</main>

<script>
const themeBtn = document.getElementById('themeBtn');
const themeIcon = document.getElementById('themeIcon');
const body = document.body;

function applyTheme(theme){
    if(theme === 'dark'){
        body.classList.add('dark-mode');
        themeIcon.classList.remove('fa-moon');
        themeIcon.classList.add('fa-sun');
    } else {
        body.classList.remove('dark-mode');
        themeIcon.classList.remove('fa-sun');
        themeIcon.classList.add('fa-moon');
    }
}

applyTheme(localStorage.getItem('portfolio-theme') || 'light');

themeBtn.addEventListener('click', ()=>{
    const newTheme = body.classList.contains('dark-mode') ? 'light':'dark';
    localStorage.setItem('portfolio-theme', newTheme);
    applyTheme(newTheme);
});

const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.classList.add('active');
        }
    });
});

document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));
</script>

</body>
</html>
